<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <!-- Include the exact font used in the portfolio -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Variables straight from style.css */
            --bg-color: #000000;
            --text-color: #ffffff;
            --text-muted: #888888;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            /* Matching the site's custom cursor logic */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient subtle grain, similar to a high-end dark theme design */
        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            pointer-events: none;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            z-index: 0;
        }

        /* Custom minimal cursor matching portfolio */
        #cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }

        #cursor-ring {
            width: 40px;
            height: 40px;
            border: 1px solid #ffffff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        /* Loader wrapper */
        .loader-wrapper {
            display: grid;
            grid-template-areas: "text" "progress" "percent";
            align-content: center;
            justify-items: center;
            gap: 2rem;
            z-index: 10;
            position: relative;
        }

        /* Typography base styling */
        .loading-text {
            grid-area: text;
            font-size: clamp(2rem, 8vw, 6rem);
            font-weight: 800;
            line-height: 1;
            text-transform: uppercase;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 50px 20px;
            margin: 0;
        }

        /* Text outline layer */
        .outline-text .char {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
        }

        /* Text filled mask layer exactly covering outline */
        .filled-text {
            pointer-events: none;
            
            /* CSS Mask hiding everything outside the circular gradient */
            --spotlight-size: 150px;
            --mouse-x: -500px;
            --mouse-y: -500px;
            -webkit-mask-image: radial-gradient(circle var(--spotlight-size) at var(--mouse-x) var(--mouse-y), black 90%, transparent 100%);
            mask-image: radial-gradient(circle var(--spotlight-size) at var(--mouse-x) var(--mouse-y), black 90%, transparent 100%);
        }

        /* The actual interior filled lettering */
        .filled-text .char {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 1), 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Shared animation logic for letters in both layers */
        .char {
            display: inline-block;
            transform: translateY(50px) scale(0.9);
            opacity: 0;
            filter: blur(10px);
            letter-spacing: 20px;
            animation: 
                advancedReveal 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards,
                continuousWave 2s ease-in-out infinite;
        }

        .char:nth-child(1) { animation-delay: 0.1s, 1.1s; }
        .char:nth-child(2) { animation-delay: 0.15s, 1.15s; }
        .char:nth-child(3) { animation-delay: 0.2s, 1.2s; }
        .char:nth-child(4) { animation-delay: 0.25s, 1.25s; }
        .char:nth-child(5) { animation-delay: 0.3s, 1.3s; }
        .char:nth-child(6) { animation-delay: 0.35s, 1.35s; }
        .char:nth-child(7) { animation-delay: 0.4s, 1.4s; }

        @keyframes advancedReveal {
            0% { 
                transform: translateY(50px) scale(0.9); 
                opacity: 0; 
                filter: blur(10px);
                letter-spacing: 20px;
            }
            100% { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
                filter: blur(0px);
                letter-spacing: -2px;
            }
        }

        @keyframes continuousWave {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        /* Clean progress line matching the portfolio's geometric minimal lines */
        .progress-container {
            grid-area: progress;
            width: 300px;
            height: 2px;
            background-color: var(--border-color);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background-color: var(--text-color);
            transition: width 0.1s cubic-bezier(0.2, 0, 0, 1);
        }

        .percentage {
            grid-area: percent;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.8s;
            text-align: center;
            z-index: 10;
        }

        @keyframes fadeIn {
            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- Subtle texture -->
    <div class="noise"></div>

    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="loader-wrapper">
        <!-- Base text layer (Outline) -->
        <div class="loading-text outline-text">
            <span class="char">M</span>
            <span class="char">U</span>
            <span class="char">R</span>
            <span class="char">T</span>
            <span class="char">H</span>
            <span class="char">Y</span>
            <span class="char">.</span>
        </div>
        
        <!-- Masked text layer (Fill) -->
        <div class="loading-text filled-text">
            <span class="char">M</span>
            <span class="char">U</span>
            <span class="char">R</span>
            <span class="char">T</span>
            <span class="char">H</span>
            <span class="char">Y</span>
            <span class="char">.</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="percentage" id="percentageText">00%</div>
    </div>

    <script>
        // Custom Cursor Logic matching portfolio
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');
        const filledText = document.querySelector('.filled-text');

        document.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            // Update custom cursor
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            // Subtle lag for the ring just like the main site
            setTimeout(() => {
                cursorRing.style.left = `${posX}px`;
                cursorRing.style.top = `${posY}px`;
            }, 50);

            // Spotlight text fill logic inside the mask layer
            // By masking the filled text DOM layer, we guarantee 100% cross-browser reliability
            if (filledText) {
                const rect = filledText.getBoundingClientRect();
                const x = posX - rect.left;
                const y = posY - rect.top;
                filledText.style.setProperty('--mouse-x', `${x}px`);
                filledText.style.setProperty('--mouse-y', `${y}px`);
            }
        });

        let currentSpotlightSize = 150;
        document.addEventListener('wheel', (e) => {
            if (filledText) {
                currentSpotlightSize += e.deltaY * -0.2;
                currentSpotlightSize = Math.max(50, Math.min(currentSpotlightSize, 600));
                filledText.style.setProperty('--spotlight-size', `${currentSpotlightSize}px`);
            }
        });

        // Progress Animation
        const progressBar = document.getElementById('progressBar');
        const percentageText = document.getElementById('percentageText');

        let progress = 0;
        const totalDuration = 3000; // 3 seconds
        const intervalTime = 20;

        const loadingInterval = setInterval(() => {
            // Speed variance for realistic loading feel
            const speed = Math.random() < 0.3 ? 0 : Math.random() * 2;
            progress += speed;

            if (progress >= 100) {
                progress = 100;
                clearInterval(loadingInterval);

                // Final completion animation
                setTimeout(() => {
                    progressBar.style.opacity = '0';
                    percentageText.style.opacity = '0';
                    progressBar.style.transition = 'opacity 0.6s ease';
                    percentageText.style.transition = 'opacity 0.6s ease';
                }, 500);
            }

            progressBar.style.width = `${progress}%`;

            // Format to keep consistent 2 digit visual where possible
            const formattedProgress = Math.floor(progress).toString().padStart(2, '0');
            percentageText.textContent = `${formattedProgress}%`;
        }, intervalTime);
    </script>
</body>

</html>
